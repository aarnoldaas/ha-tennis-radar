# Curated instrument master — the single source of truth for cross-broker identity.
#
# `id` is our stable internal identifier. `aliases` maps each broker to the
# symbol it uses (string or list). `priceSource` tells the market layer where
# to fetch the current price. For instruments that are fully liquidated and no
# longer relevant we can omit `priceSource` — they'll still resolve but won't
# have a market value.

