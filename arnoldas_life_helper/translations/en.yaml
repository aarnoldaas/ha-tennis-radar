configuration:
  poll_interval_seconds:
    name: Poll Interval (seconds)
    description: How often to check for available courts.
  scan_dates:
    name: Dates to Scan
    description: List of dates (YYYY-MM-DD) to check. Leave empty to scan the next 7 days.
  preferred_start_time:
    name: Preferred Start Time
    description: Earliest acceptable court start time (HH:MM).
  preferred_end_time:
    name: Preferred End Time
    description: Latest acceptable court start time (HH:MM).
  preferred_duration_minutes:
    name: Preferred Duration (minutes)
    description: Minimum court duration in minutes.
  notify_device:
    name: Notify Device
    description: Mobile device name for push notifications (e.g., "iphone"). Leave empty to skip mobile push.
  seb_enabled:
    name: SEB Arena Enabled
    description: Enable polling the SEB Arena provider.
  seb_session_token:
    name: SEB Arena Session Token
    description: Session token from savitarna.tenisopasaulis.lt (found in browser DevTools).
  baltic_tennis_enabled:
    name: Baltic Tennis Enabled
    description: Enable polling the Baltic Tennis provider.
  baltic_tennis_username:
    name: Baltic Tennis Username
    description: Login email for savitarna.baltictennis.lt.
  baltic_tennis_password:
    name: Baltic Tennis Password
    description: Login password for savitarna.baltictennis.lt.
  debug:
    name: Debug Mode
    description: Enable verbose logging for troubleshooting.
